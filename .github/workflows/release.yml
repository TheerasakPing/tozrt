name: Release NexTorrent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust dependencies
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build --target x86_64-unknown-linux-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: ls -la */*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-aarch64-apple-darwin/**/*.dmg
            macos-x86_64-apple-darwin/**/*.dmg
            windows-x86_64/**/*.msi
            windows-x86_64/**/*.exe
            linux-x86_64/**/*.deb
            linux-x86_64/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # NexTorrent ${{ github.ref_name }}
            
            ## 🎉 First Official Release!
            
            A modern BitTorrent client with cyberpunk UI.
            
            ### Features
            - 🚀 Lightning Fast - Rust-powered performance
            - 📊 Real-time Stats - Live bandwidth graphs
            - 🎨 Cyberpunk UI - Beautiful neon theme
            - 📁 Resume Downloads - Auto-restore on restart
            - 🏷️ Categories - Organize by type
            - 🔍 Search & Filter - Quick find
            - ⚡ Queue Management - Sequential/parallel
            - 🔔 Notifications - Download complete alerts
            - 🔄 Duplicate Detection - Prevent duplicates
            - ⚙️ Smart Port Selection - Best BitTorrent ports
            
            ### Installation
            
            **macOS:** Download the `.dmg` file for your architecture (Apple Silicon or Intel)
            **Windows:** Download the `.msi` or `.exe` installer
            **Linux:** Download the `.deb` or `.AppImage` file
            
            ### Checksums
            
            SHA256 checksums are attached to each release asset.
